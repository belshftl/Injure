name: pack-and-publish

on:
  push:
    branches: ['main']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: pack-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 10.0.x

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.decide.outputs.run_ci }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: decide
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          files="$(git diff --name-only "$base" "$GITHUB_SHA")"

          if echo "$files" | grep -Eq '^(Injure.*/.*|Injure.slnx|\.gitmodules|\.github/workflows/.*)$'; then
            echo "run_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_ci=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    if: needs.check-changes.outputs.run_ci == 'true'
    needs: check-changes
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build libmisc
        working-directory: Injure.Native/misc
        run: make RID=linux-x64

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

  build-native:
    needs: [check-changes, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            runs_on: macos-14
            libaudio_out_name: libinjureaudio.dylib
            libmisc_out_name: libinjuremisc.dylib
          - rid: linux-x64
            runs_on: ubuntu-24.04
            libaudio_out_name: libinjureaudio.so
            libmisc_out_name: libinjuremisc.so
          - rid: linux-arm64
            runs_on: ubuntu-24.04-arm
            libaudio_out_name: libinjureaudio.so
            libmisc_out_name: libinjuremisc.so
          # TODO:
          # - rid: osx-x64
          #   runs_on: macos-15-intel
          #   libaudio_out_name: libinjureaudio.dylib
          #   libmisc_out_name: libinjuremisc.dylib
          # - rid: win-x64
          #   runs_on: windows-2025
          #   libaudio_out_name: injureaudio.dll
          #   libmisc_out_name: injuremisc.dll

    runs-on: ${{ matrix.runs_on }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install native deps for macOS
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install jack pkgconf
          echo "PKG_CONFIG_PATH=$(brew --prefix jack)/lib/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"

      - name: Install native deps for Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends libjack-jackd2-dev pkg-config

      - name: Build native
        working-directory: Injure.Native
        run: make OUTDIR=stage MODE=release RID=${{ matrix.rid }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: |
            Injure.Native/stage/${{ matrix.libaudio_out_name }}
            Injure.Native/stage/${{ matrix.rid }}/${{ matrix.libmisc_out_name }}

  pack-and-push:
    if: github.event_name != 'pull_request'
    needs: [check-changes, test, build-native]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Fetch artifact for osx-arm64
        uses: actions/download-artifact@v5
        with:
          name: native-osx-arm64
          path: Injure.Native/pack/osx-arm64
          merge-multiple: true

      - name: Fetch artifact for linux-x64
        uses: actions/download-artifact@v5
        with:
          name: native-linux-x64
          path: Injure.Native/pack/linux-x64
          merge-multiple: true

      - name: Fetch artifact for linux-arm64
        uses: actions/download-artifact@v5
        with:
          name: native-linux-arm64
          path: Injure.Native/pack/linux-arm64
          merge-multiple: true

      - name: Get package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="0.1.0-ci.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Pack Injure.Native
        run: >
          dotnet pack Injure.Native/Injure.Native.csproj -c Release -o artifacts/nuget -p:Version=${{ steps.version.outputs.version }}

      - name: Pack Injure
        run: >
          dotnet pack Injure/Injure.csproj -c Release -o artifacts/nuget -p:Version=${{ steps.version.outputs.version }}

      - name: Pack Injure.ModKit
        run: >
          dotnet pack Injure.ModKit/Injure.ModKit.csproj -c Release -o artifacts/nuget -p:Version=${{ steps.version.outputs.version }}

      - name: Pack Injure.ModKit.Analyzers
        run: >
          dotnet pack Injure.ModKit.Analyzers/Injure.ModKit.Analyzers.csproj -c Release -o artifacts/nuget -p:Version=${{ steps.version.outputs.version }}

      - name: Pack Injure.ModKit.Analyzers.CodeFixes
        run: >
          dotnet pack Injure.ModKit.Analyzers.CodeFixes/Injure.ModKit.Analyzers.CodeFixes.csproj -c Release -o artifacts/nuget -p:Version=${{ steps.version.outputs.version }}

      - name: Pack Injure.ModKit.Mods
        run: >
          dotnet pack Injure.ModKit.Mods/Injure.ModKit.Mods.csproj -c Release -o artifacts/nuget -p:Version=${{ steps.version.outputs.version }}

      - name: Add GitHub Packages source
        run: >
          dotnet nuget add source --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }}
          --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Push packages
        run: >
          dotnet nuget push "artifacts/nuget/*.nupkg" --source github --skip-duplicate

